name: Test and Release

# Run this job on all pushes and pull requests
# as well as tags with a semantic version
on:
  push:
    branches:
      - "main"
    tags:
      # normal versions
      - "v[0-9]+.[0-9]+.[0-9]+"
      # pre-releases
      - "v[0-9]+.[0-9]+.[0-9]+-**"
  pull_request: {}

# ioBroker adapter-check E3009 — concurrency directly after `on:` (see ioBroker.example)
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  # ioBroker testing-action-* v1 still uses checkout@v4/setup-node@v4 (Node 20 runtime)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  # Performs quick checks before the expensive test runs
  check-and-lint:
    if: contains(github.event.head_commit.message, '[skip ci]') == false

    runs-on: ubuntu-latest

    steps:
      - uses: ioBroker/testing-action-check@v2
        with:
          node-version: "24.x"
          # Uncomment the following line if your adapter cannot be installed using 'npm ci'
          # install-command: 'npm install'
          type-checking: true
          lint: true

  # Runs adapter tests on all supported node versions and OSes
  adapter-tests:
    needs: check-and-lint
    # Tag pushes reuse the commit already tested on main; nested checkout on tags can fail.
    if: |
      contains(github.event.head_commit.message, '[skip ci]') == false &&
      !startsWith(github.ref, 'refs/tags/v')

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [22.x, 24.x]
        # Linux only: js-controller install in integration tests is slow/unreliable on Windows/macOS CI
        os: [ubuntu-latest]

    steps:
      - uses: ioBroker/testing-action-adapter@v1
        with:
          node-version: ${{ matrix.node-version }}
          os: ${{ matrix.os }}
          # Uncomment the following line if your adapter cannot be installed using 'npm ci'
          # install-command: 'npm install'
          build: true

  # Deploys the final package to NPM (requires npm trusted publisher for this GitHub repo)
  # See https://docs.npmjs.com/trusted-publishers
  deploy:
    needs: [check-and-lint, adapter-tests]

    if: |
      always() &&
      !cancelled() &&
      (github.event.head_commit == null || contains(github.event.head_commit.message, '[skip ci]') == false) &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.check-and-lint.result == 'success' &&
      (needs.adapter-tests.result == 'success' || needs.adapter-tests.result == 'skipped')

    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write

    steps:
      - uses: ioBroker/testing-action-deploy@v1
        with:
          node-version: "24.x"
          build: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
