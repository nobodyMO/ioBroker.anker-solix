# Dependabot: cron schedules spread load (iobroker-bot S8906)
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: cron
      timezone: Europe/Berlin
      cronjob: "23 2 14 * *"
    cooldown:
      default: 7
    open-pull-requests-limit: 15
    assignees:
      - MatthiasUlrich1
    versioning-strategy: increase
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: cron
      timezone: Europe/Berlin
      cronjob: "47 3 22 * *"
    open-pull-requests-limit: 15
    assignees:
      - MatthiasUlrich1
